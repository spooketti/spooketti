name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🗃️ Base content
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: header, activity, community, repositories, metadata

      - name: 📓 Featured repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: spooketti/Phylogenetic-Taxonomy-Comparison
          output_action: commit
          delay: 60
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 📅 Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # - name: 🈷️ Languages activity
      #   uses: lowlighter/metrics@latest
      #   with:
      #     use_prebuilt_image: yes
      #     filename: metrics/metrics.languages.svg
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     plugins_errors_fatal: yes
      #     user: spooketti
      #     template: classic
      #     config_timezone: America/Los_Angeles
      #     base: ""
      #     plugin_languages: yes
      #     plugin_languages_analysis_timeout: 15
      #     plugin_languages_analysis_timeout_repositories: 7.5
      #     plugin_languages_categories: markup, programming
      #     plugin_languages_colors: github
      #     plugin_languages_limit: 9
      #     plugin_languages_recent_categories: markup, programming
      #     plugin_languages_recent_days: 14
      #     plugin_languages_recent_load: 300
      #     plugin_languages_sections: most-used
      #     plugin_languages_threshold: 0%

      - name: ✨ Stargazers
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.stargazers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_stargazers: yes
          output_action: commit
          delay: 60
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 👨‍💻 Lines of code changed
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.lines.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: repositories
          plugin_lines: yes
          plugin_lines_delay: 30
          output_action: commit
          delay: 60
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 👨‍💻 Lines of code changed history
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.lines.history.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_lines: yes
          plugin_lines_delay: 30
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 2
          plugin_lines_history_limit: 1
          repositories_skipped: |
            @use.patterns
            */*
            +lowlighter/metrics
          output_action: commit
          delay: 60
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 💡 Coding habits facts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.habits.facts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          output_action: commit
          delay: 60
          user: spooketti

      - name: 📈 Recent activity charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.habits.charts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_habits_from: 1000
          plugin_habits_days: 30
          config_timezone: America/Los_Angeles
          output_action: commit
          delay: 60
          user: spooketti

      - name: 💻 Code snippet of the day
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.code.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_code: yes
          plugin_code_languages: javascript, html, css, python, go, java
          plugin_code_load: 400
          output_action: commit
          delay: 60
          user: spooketti

      - name: 🙋 Organization introduction
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.introduction.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Superposition-Development
          base: header
          plugin_introduction: yes
          output_action: commit
          delay: 60
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 📰 Recent activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review
          output_action: commit
          delay: 60
          user: spooketti
