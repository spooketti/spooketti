name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🗃️ Base content
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: header, activity, community, repositories, metadata

      - name: 📅 Isometric commit calendar
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: 🈷️ Languages activity
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: ""
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

      - name: ✨ Stargazers
        uses: lowlighter/metrics@latest
        with:
          use_prebuilt_image: yes
          filename: metrics/metrics.stargazers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          plugins_errors_fatal: yes
          user: spooketti
          template: classic
          config_timezone: America/Los_Angeles
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14

      - name: 🈷️ Languages activity - Most used
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.starlists.languages.svg
          token: NOT_NEEDED
          base: ""
          plugin_starlists: yes
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8
          plugin_starlists_limit_repositories: 0
          plugin_starlists_only: Awesome
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 🈷️ Languages activity - Details
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.languages.details.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 🈷️ Languages activity - Indepth analysis
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: >-
            tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
      - name: ✨ Stargazers - Using classic charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.stargazers.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_stargazers: yes
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
      - name: ✨ Stargazers - Using graph charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.stargazers.graph.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 👨‍💻 Lines of code changed - Compact display in base plugin
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.lines.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: repositories
          plugin_lines: yes
          plugin_lines_delay: 30
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
      - name: 👨‍💻 Lines of code changed - Repositories and diff history
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.lines.history.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_lines: yes
          plugin_lines_delay: 30
          plugin_lines_sections: repositories, history
          plugin_lines_repositories_limit: 2
          plugin_lines_history_limit: 1
          repositories_skipped: |
            @use.patterns
            */*
            +lowlighter/metrics
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
        
      - name: 📌 Starred topics - Icons
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.topics.icons.svg
          token: NOT_NEEDED
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 💡 Coding habits and activity - Mildly interesting facts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.habits.facts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: no
          user: spooketti
      - name: Recent activity charts
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.habits.charts.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_habits: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_habits_facts: no
          plugin_habits_charts: yes
          plugin_habits_from: 1000
          plugin_habits_days: 30
          config_timezone: America/Los_Angeles

      - name: 📓 Featured repositories - Featured repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: lowlighter/metrics
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
      - name: 📓 Featured repositories - Pinned repositories
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.repositories.pinned.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_repositories: yes
          plugin_repositories_pinned: 2
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: ♐ Random code snippet - JavaScript or TypeScript snippet of the day
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.code.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_code: yes
          plugin_code_languages: javascript, html, css, python, java, csharp, go
          plugin_code_load: 400
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}

      - name: 🙋 Introduction - Organization introduction
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.introduction.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Superposition-Development
          base: header
          plugin_introduction: yes
          output_action: commit
          delay: 120
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
      - name: 🙋 Introduction - Repository introduction
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/metrics.plugin.introduction.repository.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: repository
          repo: spooketti/fivenights
          base: header
          plugin_introduction: yes
          output_action: commit
          delay: 120
          user: spooketti
          plugins_errors_fatal: yes
        if: ${{ success() || failure() }}
